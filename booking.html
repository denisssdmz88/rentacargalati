<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rezervare - Rent a Car Galați</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.css">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: #111;
    color: #fff;
}

/* Header identic cu prima pagina */
header{
    position: fixed;
    width: 100%;
    padding: 25px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size: 24px;
    font-weight: bold;
}

.logo a {
    color: white;
    text-decoration: none;
}

nav a{
    text-decoration: none;
    color: white;
    margin-left: 25px;
    transition: .3s;
}

nav a:hover{
    color: #ffb400;
}

.cta-btn{
    padding: 12px 24px;
    background: #ffb400;
    border-radius: 30px;
    color: black;
    font-weight: bold;
    text-decoration: none;
    display: inline-block;
    border: none;
    cursor: pointer;
    transition: .3s;
}

.cta-btn:hover {
    background: #e09e00;
}

.cta-btn.secondary {
    background: transparent;
    border: 2px solid white;
    color: white;
}

.cta-btn.secondary:hover {
    background: white;
    color: black;
}

/* Sectiunea Hero adaptata pentru Booking */
.hero{
    height: 40vh;
    display: flex;
    align-items: center;
    padding: 80px 8% 0 8%;
    background: linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)), url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=2000');
    background-size: cover;
    background-position: center;
    text-align: center;
    justify-content: center;
}

.hero h1{
    font-size: 48px;
}

/* Container si Formular */
.container{
    padding: 60px 8%;
    max-width: 900px;
    margin: 0 auto;
}

.card{
    background: #1c1c1c;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#map{
    height: 350px;
    border-radius: 15px;
    margin: 20px 0;
    border: 1px solid #333;
}

.row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

input[type="text"] {
    width: 100%;
    padding: 16px;
    background: #252525;
    color: #fff;
    border: 1px solid #333;
    border-radius: 12px;
    font-size: 16px;
    transition: .3s;
}

input[type="text"]:focus {
    outline: none;
    border-color: #ffb400;
    background: #2a2a2a;
}

.checkbox-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 25px 0;
    cursor: pointer;
    font-size: 15px;
    color: #ccc;
}

.checkbox-container input {
    width: 18px;
    height: 18px;
    accent-color: #ffb400;
}

/* Modal-ul de masini */
.modal{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 9999;
    padding: 40px 8%;
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    border-bottom: 1px solid #222;
    padding-bottom: 20px;
}

.modal h2 {
    font-size: 32px;
}

.cars{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

.car{
    background: #1c1c1c;
    border-radius: 15px;
    padding: 25px;
    border: 1px solid #222;
    transition: .3s;
}

.car:hover {
    transform: translateY(-5px);
    border-color: #ffb400;
}

.car h3 {
    font-size: 22px;
    margin-bottom: 10px;
}

.car p {
    font-size: 20px;
    color: #ffb400;
    font-weight: bold;
    margin-bottom: 15px;
}

footer{
    padding: 40px;
    text-align: center;
    background: black;
    color: #aaa;
    border-top: 1px solid #111;
}

@media(max-width:768px){
    .hero h1{
        font-size: 36px;
    }
    nav{
        display: none;
    }
    .row {
        grid-template-columns: 1fr;
    }
    .card {
        padding: 20px;
    }
}
</style>
</head>
<body>

<header>
<div class="logo"><a href="index.html">RENT A CAR GALAȚI</a></div>
<nav>
<a href="index.html">Acasă</a>
<a href="#">Flotă</a>
<a href="#">Despre</a>
<a href="#">Contact</a>
<a class="cta-btn" href="booking.html">Rezervă acum</a>
</nav>
</header>

<section class="hero">
    <h1>Rezervare mașină</h1>
</section>

<div class="container">
    <div class="card">
        <input type="text" id="address" placeholder="Adresă preluare Galați">
        <div id="map"></div>

        <div class="row">
            <input type="text" id="pickup" placeholder="Preluare">
            <input type="text" id="dropoff" placeholder="Predare">
        </div>

        <label class="checkbox-container">
            <input type="checkbox" id="license"> 
            Am permis minim 1 an
        </label>
        
        <button class="cta-btn" style="width: 100%; text-align: center;" onclick="openModal()">Alege mașina</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-header">
        <h2>Mașini disponibile</h2>
        <button class="cta-btn secondary" onclick="closeModal()">Închide</button>
    </div>
    <div class="cars">
        <div class="car">
            <h3>Mercedes C Class</h3>
            <p>45€ / zi</p>
            <button class="cta-btn" style="padding: 8px 16px; font-size: 14px;">Selectează</button>
        </div>
        <div class="car">
            <h3>BMW Seria 3</h3>
            <p>50€ / zi</p>
            <button class="cta-btn" style="padding: 8px 16px; font-size: 14px;">Selectează</button>
        </div>
    </div>
</div>

<footer>Rent a Car Galați © 2026</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.js"></script>

<script>
flatpickr("#pickup",{enableTime:true,time_24hr:true,dateFormat:"d.m.Y H:i",
plugins:[new confirmDatePlugin({confirmText:"Confirmă"})]});

flatpickr("#dropoff",{enableTime:true,time_24hr:true,dateFormat:"d.m.Y H:i",
plugins:[new confirmDatePlugin({confirmText:"Confirmă"})]});

let map=L.map('map').setView([45.4353,28.0079],13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker=L.marker([45.4353,28.0079]).addTo(map);

map.on('click',e=>{
marker.setLatLng(e.latlng);
document.getElementById('address').value=e.latlng.lat.toFixed(5)+", "+e.latlng.lng.toFixed(5);
});

function openModal(){
const pickup = document.getElementById('pickup');
const dropoff = document.getElementById('dropoff');
const license = document.getElementById('license');
const modal = document.getElementById('modal');

if(!pickup.value||!dropoff.value||!license.checked){
alert("Completează toate câmpurile");
return;
}
modal.style.display="block";
}

function closeModal(){
document.getElementById('modal').style.display="none";
}
</script>

</body>
</html>
