<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rezervare - Rent a Car Galați</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.css">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: #111;
    color: #fff;
}

header{
    position: fixed;
    width: 100%;
    padding: 25px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size: 24px;
    font-weight: bold;
}

.logo a {
    color: white;
    text-decoration: none;
}

nav a{
    text-decoration: none;
    color: white;
    margin-left: 25px;
    transition: .3s;
}

nav a:hover{
    color: #ffb400;
}

.cta-btn{
    padding: 12px 24px;
    background: #ffb400;
    border-radius: 30px;
    color: black;
    font-weight: bold;
    text-decoration: none;
    display: inline-block;
    border: none;
    cursor: pointer;
    transition: .3s;
    text-align: center;
}

.cta-btn:hover {
    background: #e09e00;
}

.cta-btn.secondary {
    background: transparent;
    border: 2px solid white;
    color: white;
}

.cta-btn.secondary:hover {
    background: white;
    color: black;
}

.hero{
    height: 40vh;
    display: flex;
    align-items: center;
    padding: 80px 8% 0 8%;
    background: linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)), url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=2000');
    background-size: cover;
    background-position: center;
    text-align: center;
    justify-content: center;
}

.hero h1{
    font-size: 48px;
}

.container{
    padding: 60px 8%;
    max-width: 900px;
    margin: 0 auto;
}

.card{
    background: #1c1c1c;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid #222;
}

#map{
    height: 300px;
    border-radius: 15px;
    margin: 20px 0;
    border: 1px solid #333;
}

.row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.form-group-booking {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.form-group-booking label {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 8px;
}

input[type="text"], input[type="email"], textarea {
    width: 100%;
    padding: 16px;
    background: #252525;
    color: #fff;
    border: 1px solid #333;
    border-radius: 12px;
    font-size: 16px;
    transition: .3s;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #ffb400;
    background: #2a2a2a;
}

input[readonly] {
    background: #1a1a1a;
    border-color: #222;
    color: #ffb400;
    font-weight: 600;
    cursor: not-allowed;
}

.checkbox-container {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 15px 0;
    cursor: pointer;
    font-size: 14px;
    color: #ccc;
}

.checkbox-container input {
    width: 18px;
    height: 18px;
    accent-color: #ffb400;
    margin-top: 2px;
    flex-shrink: 0;
}

/* Zonele de Formular Pasul 2 */
#checkout-section {
    display: none;
    margin-top: 30px;
    border-top: 1px solid #333;
    padding-top: 30px;
}

.selected-car-badge {
    background: rgba(255, 180, 0, 0.1);
    border: 1px dashed #ffb400;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 25px;
    color: #ffb400;
    font-weight: bold;
    text-align: center;
}

/* Tab-uri */
.tabs-container {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

.tab-btn {
    flex: 1;
    padding: 14px;
    background: #252525;
    border: 1px solid #333;
    color: white;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.tab-btn.active {
    background: #ffb400;
    color: black;
    border-color: #ffb400;
}

.tab-panel {
    display: none;
}

.tab-panel.active {
    display: block;
}

/* --- DESIGN CONTAINERE PLATA --- */
